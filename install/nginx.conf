proxy_cache_path __NGINX_CACHE_DIR__ levels=1:2 keys_zone=aurora_admin_static:64m max_size=2g inactive=30d use_temp_path=off;

## __BROTLI_BEGIN__
brotli on;
brotli_static on;
brotli_comp_level 5;
brotli_min_length 512;
brotli_types
  text/plain
  text/css
  text/xml
  text/javascript
  application/javascript
  application/x-javascript
  application/json
  application/xml
  application/rss+xml
  application/wasm
  image/svg+xml;
## __BROTLI_END__

gzip on;
gzip_vary on;
gzip_comp_level 5;
gzip_min_length 512;
gzip_proxied any;
gzip_types
  text/plain
  text/css
  text/xml
  text/javascript
  application/javascript
  application/x-javascript
  application/json
  application/xml
  application/rss+xml
  application/wasm
  image/svg+xml;

server {
  listen 80;
  listen [::]:80;
  server_name __SERVER_NAME__;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name __SERVER_NAME__;

  ssl_certificate __TLS_CERT_FILE__;
  ssl_certificate_key __TLS_KEY_FILE__;
  ssl_session_timeout 10m;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers off;

  location ~ ^/admin\.transport\.runtime\.v1\.RuntimeService/(BootstrapAgent|ReportAgentHeartbeat|GetAgentMetricsPolicy|ReportAgentMetrics|ApplySharedCORS)$ {
    grpc_pass grpcs://127.0.0.1:__BACKEND_PORT__;
    grpc_set_header Host $host;
    grpc_set_header X-Real-IP $remote_addr;
    grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    grpc_set_header X-Forwarded-Proto https;
    grpc_connect_timeout 30s;
    grpc_send_timeout 3600s;
    grpc_read_timeout 3600s;

    grpc_ssl_server_name on;
    grpc_ssl_name __SERVER_NAME__;
    grpc_ssl_verify on;
    grpc_ssl_trusted_certificate __TLS_CA_FILE__;
    grpc_ssl_certificate __TLS_NGINX_CLIENT_CERT_FILE__;
    grpc_ssl_certificate_key __TLS_NGINX_CLIENT_KEY_FILE__;
  }

  location ~ ^/admin\.transport\.cert\.v1\.CertService/Get$ {
    grpc_pass grpcs://127.0.0.1:__BACKEND_PORT__;
    grpc_set_header Host $host;
    grpc_set_header X-Real-IP $remote_addr;
    grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    grpc_set_header X-Forwarded-Proto https;
    grpc_connect_timeout 30s;
    grpc_send_timeout 120s;
    grpc_read_timeout 120s;

    grpc_ssl_server_name on;
    grpc_ssl_name __SERVER_NAME__;
    grpc_ssl_verify on;
    grpc_ssl_trusted_certificate __TLS_CA_FILE__;
    grpc_ssl_certificate __TLS_NGINX_CLIENT_CERT_FILE__;
    grpc_ssl_certificate_key __TLS_NGINX_CLIENT_KEY_FILE__;
  }

  location = /api/v1/modules/install/stream {
    proxy_pass https://127.0.0.1:__BACKEND_PORT__;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Connection "";
    proxy_connect_timeout 30s;
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;
    send_timeout 3600s;
    proxy_buffering off;
    proxy_request_buffering off;
    chunked_transfer_encoding on;
    gzip off;

    proxy_ssl_server_name on;
    proxy_ssl_name __SERVER_NAME__;
    proxy_ssl_verify on;
    proxy_ssl_trusted_certificate __TLS_CA_FILE__;
    proxy_ssl_certificate __TLS_NGINX_CLIENT_CERT_FILE__;
    proxy_ssl_certificate_key __TLS_NGINX_CLIENT_KEY_FILE__;
  }

  location = /api/v1/modules/reinstall-cert/stream {
    proxy_pass https://127.0.0.1:__BACKEND_PORT__;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Connection "";
    proxy_connect_timeout 30s;
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;
    send_timeout 3600s;
    proxy_buffering off;
    proxy_request_buffering off;
    chunked_transfer_encoding on;
    gzip off;

    proxy_ssl_server_name on;
    proxy_ssl_name __SERVER_NAME__;
    proxy_ssl_verify on;
    proxy_ssl_trusted_certificate __TLS_CA_FILE__;
    proxy_ssl_certificate __TLS_NGINX_CLIENT_CERT_FILE__;
    proxy_ssl_certificate_key __TLS_NGINX_CLIENT_KEY_FILE__;
  }

  location ^~ /assets/ {
    proxy_pass https://127.0.0.1:__BACKEND_PORT__;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
    proxy_buffering on;
    proxy_cache aurora_admin_static;
    proxy_cache_key "$scheme$request_method$host$request_uri";
    proxy_cache_methods GET HEAD;
    proxy_cache_lock on;
    proxy_cache_revalidate on;
    proxy_cache_background_update on;
    proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
    proxy_cache_valid 200 301 302 30d;
    proxy_cache_valid 404 1m;
    add_header Cache-Control "public, max-age=2592000, immutable" always;
    add_header X-Cache-Status $upstream_cache_status always;

    proxy_ssl_server_name on;
    proxy_ssl_name __SERVER_NAME__;
    proxy_ssl_verify on;
    proxy_ssl_trusted_certificate __TLS_CA_FILE__;
    proxy_ssl_certificate __TLS_NGINX_CLIENT_CERT_FILE__;
    proxy_ssl_certificate_key __TLS_NGINX_CLIENT_KEY_FILE__;
  }

  location ~* \.(?:js|mjs|css|map|png|jpg|jpeg|gif|svg|ico|webp|avif|woff|woff2|ttf)$ {
    proxy_pass https://127.0.0.1:__BACKEND_PORT__;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
    proxy_buffering on;
    proxy_cache aurora_admin_static;
    proxy_cache_key "$scheme$request_method$host$request_uri";
    proxy_cache_methods GET HEAD;
    proxy_cache_lock on;
    proxy_cache_revalidate on;
    proxy_cache_background_update on;
    proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
    proxy_cache_valid 200 301 302 30d;
    proxy_cache_valid 404 1m;
    add_header Cache-Control "public, max-age=2592000, immutable" always;
    add_header X-Cache-Status $upstream_cache_status always;

    proxy_ssl_server_name on;
    proxy_ssl_name __SERVER_NAME__;
    proxy_ssl_verify on;
    proxy_ssl_trusted_certificate __TLS_CA_FILE__;
    proxy_ssl_certificate __TLS_NGINX_CLIENT_CERT_FILE__;
    proxy_ssl_certificate_key __TLS_NGINX_CLIENT_KEY_FILE__;
  }

  location / {
    proxy_pass https://127.0.0.1:__BACKEND_PORT__;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_connect_timeout 30s;
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;
    send_timeout 3600s;
    proxy_buffering off;
    proxy_request_buffering off;
    chunked_transfer_encoding on;

    proxy_ssl_server_name on;
    proxy_ssl_name __SERVER_NAME__;
    proxy_ssl_verify on;
    proxy_ssl_trusted_certificate __TLS_CA_FILE__;
    proxy_ssl_certificate __TLS_NGINX_CLIENT_CERT_FILE__;
    proxy_ssl_certificate_key __TLS_NGINX_CLIENT_KEY_FILE__;
  }
}
